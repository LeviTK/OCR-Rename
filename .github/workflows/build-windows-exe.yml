name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-windows-exe.yml'
      - '.github/workflows/release-windows-exe.yml'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'SCRIPT_GUIDE.txt'
      - '项目指南.md'
      - 'Release/build_windows_exe.py'
      - 'Release/build_windows_exe.bat'
      - 'Release/README.md'
      - 'Release/exe_entry.py'
      - 'input/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'src/**'
      - 'tessdata/**'

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10 x64
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Install Tesseract runtime
        shell: powershell
        run: |
          choco install tesseract -y --no-progress

          $candidates = @(
            "$env:ProgramFiles\Tesseract-OCR",
            "${env:ProgramFiles(x86)}\Tesseract-OCR"
          )

          $tesseractDir = $candidates | Where-Object {
            $_ -and (Test-Path (Join-Path $_ 'tesseract.exe'))
          } | Select-Object -First 1

          if (-not $tesseractDir) {
            throw 'Tesseract install succeeded but tesseract.exe was not found.'
          }

          "OCR_RENAME_TESSERACT_DIR=$tesseractDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & (Join-Path $tesseractDir 'tesseract.exe') --version

      - name: Install build dependencies
        shell: powershell
        run: |
          py -3.10 -m pip install --upgrade pip
          py -3.10 -m pip install -e .[build]

      - name: Build Windows EXE package
        shell: cmd
        run: Release\build_windows_exe.bat

      - name: Upload Windows EXE package directory
        uses: actions/upload-artifact@v4
        with:
          name: OCR-Rename-windows-exe-package
          path: |
            Release/dist/OCR-Rename-windows-exe-v*/**
            !Release/dist/OCR-Rename-windows-exe-v*.zip
          if-no-files-found: error

      - name: Upload Windows EXE zip
        uses: actions/upload-artifact@v4
        with:
          name: OCR-Rename-windows-exe-zip
          path: Release/dist/OCR-Rename-windows-exe-v*.zip
          if-no-files-found: error
